name: "Political Commentary Search"
description: "Political commentary profile emphasizing official and major-news sources"
query_prefix: "local politics statement interview policy"
query_suffix: "city council mayor councillor official statement"
append_city: true
required_terms: []
excluded_terms:
  - "reddit.com"
  - "4chan.org"
search_depth: "advanced"
topic: "news"
days: 60
max_results_cap: 15
include_domains:
  - "ballotpedia.org"
  - "apnews.com"
  - "reuters.com"
exclude_domains:
  - "twitter.com"
  - "x.com"
  - "facebook.com"
  - "instagram.com"
  - "medium.com"
  - "substack.com"
