name: "Legislation Search"
description: "Municipal legislation search profile — score-ranked, no domain whitelist"

# Query construction: the agent already builds targeted queries like
# "Toronto city council legislation March 28 2026", so we keep the prefix
# minimal to avoid redundancy and let Tavily rank naturally.
query_prefix: ""
append_city: true
search_depth: "advanced"
topic: "news"
days: 60
max_results_cap: 20

# Tavily relevance score threshold (0.0–1.0).  Results below this are
# discarded before the agent ever sees them.  0.35 filters out low-quality
# noise while keeping local-government and news sources.
min_score: 0.35

# Exclusion-based filtering: block known low-quality domains instead of
# whitelisting a handful of US-centric ones.  The downstream Wikidata +
# LLM reliability analysis handles finer-grained quality judgment.
exclude_domains:
  - "twitter.com"
  - "x.com"
  - "facebook.com"
  - "instagram.com"
  - "tiktok.com"
  - "reddit.com"
  - "medium.com"
  - "substack.com"
  - "quora.com"
  - "youtube.com"
  - "wikipedia.org"
  - "change.org"
  - "petition.parliament.uk"
  - "yelp.com"
  - "nextdoor.com"
  - "patch.com"
  - "blogspot.com"
  - "wordpress.com"
  - "tumblr.com"
