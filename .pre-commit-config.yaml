# Lightweight slop-catcher — blocks glaring issues only.
# Full lint + format enforcement lives in CI (.github/workflows/lint.yml).
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.15
    hooks:
      - id: ruff
        args:
          - "--select"
          # F  — dead code: unused imports/vars, undefined names
          # W  — whitespace issues (blank lines, trailing WS)
          # ERA — commented-out code left behind
          # PIE790 — unnecessary `pass` in non-empty bodies
          - "F,W,ERA,PIE790"
          - "--fix"
          - "--exit-non-zero-on-fix"

  - repo: local
    hooks:
      - id: compileall
        name: compileall
        entry: python -m compileall -q .
        language: system
        types: [python]
        pass_filenames: false
